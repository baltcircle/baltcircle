name: Setup OSM Tile Server

on:
  push:
    branches:
      - osm-setup
  workflow_dispatch:

jobs:
  setup:
    name: Install OSM tile server on VM
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      - name: Create OSM directories
        run: mkdir -p /home/yc-user/osm/config

      - name: Download Kaliningrad OSM data
        run: |
          cd /home/yc-user/osm
          # Remove if < 1MB (failed download)
          if [ -f kaliningrad.osm.pbf ] && [ $(stat -c%s kaliningrad.osm.pbf) -lt 1048576 ]; then
            echo "PBF too small, re-downloading..."
            rm kaliningrad.osm.pbf
          fi
          if [ -f kaliningrad.osm.pbf ]; then
            echo "Already exists: $(du -sh kaliningrad.osm.pbf)"
          else
            echo "Downloading Kaliningrad OSM extract..."
            curl -L --retry 3 -o kaliningrad.osm.pbf \
              https://download.geofabrik.de/russia/kaliningradskaya-oblast-latest.osm.pbf
            echo "Done: $(du -sh kaliningrad.osm.pbf)"
          fi

      - name: Install Tilemaker
        env:
          # sha256 of tilemaker-ubuntu-22.04.zip for the pinned release below.
          # Update this whenever the Tilemaker version in the URL changes.
          TILEMAKER_SHA256: a9cc99250782969aa41344f3a46a7a921b92525502e6d5a224e63fb9c4918150
        run: |
          if command -v tilemaker &>/dev/null; then
            echo "Already installed"
          else
            cd /tmp
            curl -L -o tilemaker.zip \
              https://github.com/systemed/tilemaker/releases/download/v2.4.0/tilemaker-ubuntu-22.04.zip
            echo "${TILEMAKER_SHA256}  tilemaker.zip" | sha256sum -c -
            unzip -o tilemaker.zip
            sudo cp build/tilemaker /usr/local/bin/tilemaker
            sudo chmod +x /usr/local/bin/tilemaker
            echo "Installed: $(tilemaker --version 2>&1 | head -1)"
          fi

      - name: Download Tilemaker config
        run: |
          cd /home/yc-user/osm
          [ -f process.lua ] || curl -fL -o process.lua \
            https://raw.githubusercontent.com/systemed/tilemaker/master/resources/process-openmaptiles.lua
          [ -f config.json ] || curl -fL -o config.json \
            https://raw.githubusercontent.com/systemed/tilemaker/master/resources/config-openmaptiles.json
          echo "Config ready"

      - name: Build MBTiles
        run: |
          cd /home/yc-user/osm
          # Remove broken file if < 1MB
          if [ -f kaliningrad.mbtiles ] && [ $(stat -c%s kaliningrad.mbtiles) -lt 1048576 ]; then
            echo "File too small ($(du -sh kaliningrad.mbtiles)), removing and rebuilding..."
            rm kaliningrad.mbtiles
          fi
          if [ -f kaliningrad.mbtiles ]; then
            echo "Already built: $(du -sh kaliningrad.mbtiles)"
          else
            echo "Building tiles (5-15 min)..."
            tilemaker \
              --input  kaliningrad.osm.pbf \
              --output kaliningrad.mbtiles \
              --config config.json \
              --process process.lua \
              --bbox 19.0,54.0,23.0,56.0
            echo "Done: $(du -sh kaliningrad.mbtiles)"
          fi

      - name: Write tileserver config
        run: |
          cat > /home/yc-user/osm/config/tileserver-config.json <<'JSON'
          {"options":{"paths":{"root":"/data","mbtiles":"/data"}},"data":{"kaliningrad":{"mbtiles":"kaliningrad.mbtiles"}}}
          JSON
          echo "Config written"

      - name: Write docker-compose
        run: |
          printf '%s\n' \
            'version: "3.8"' \
            'services:' \
            '  tileserver:' \
            '    image: maptiler/tileserver-gl:latest' \
            '    container_name: baltcircle-tileserver' \
            '    restart: unless-stopped' \
            '    ports:' \
            '      - "8080:8080"' \
            '    volumes:' \
            '      - /home/yc-user/osm:/data' \
            '    command: --config /data/config/tileserver-config.json --port 8080' \
            > /home/yc-user/osm/docker-compose.yml
          echo "docker-compose written"

      - name: Start tileserver-gl
        run: |
          cd /home/yc-user/osm
          docker compose pull --quiet
          docker compose up -d
          echo "Started, waiting 20s..."
          sleep 20

      - name: Smoke test
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/ >/dev/null 2>&1; then
              echo "Tileserver UP"
              break
            fi
            echo "Waiting $i/12..."
            sleep 10
          done
          echo "=== Tile data info ==="
          curl -s http://localhost:8080/data/kaliningrad.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Name:', d.get('name')); print('Bounds:', d.get('bounds'))" \
            2>/dev/null || true
          echo "=== Docker logs ==="
          docker logs baltcircle-tileserver --tail 10
