name: Setup OSM Tile Server

on:
  push:
    branches:
      - osm-setup

jobs:
  setup:
    name: Install OSM tile server on VM
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      - name: Create OSM directories
        run: |
          mkdir -p /home/yc-user/osm/config
          echo "Directories ready"

      - name: Download Kaliningrad OSM data
        run: |
          cd /home/yc-user/osm
          if [ ! -f "kaliningrad.osm.pbf" ]; then
            echo "Downloading Kaliningrad OSM extract (~50MB)..."
            curl -L --retry 3 -o kaliningrad.osm.pbf \
              "https://download.geofabrik.de/russia/kaliningradskaya-oblast-latest.osm.pbf"
            echo "Done: $(du -sh kaliningrad.osm.pbf)"
          else
            echo "Already exists: $(du -sh kaliningrad.osm.pbf)"
          fi

      - name: Install Tilemaker binary
        run: |
          if command -v tilemaker &>/dev/null; then
            echo "Already installed: $(tilemaker --version 2>&1 | head -1)"
          else
            echo "Installing Tilemaker v2.4.0..."
            cd /tmp
            curl -L -o tilemaker.zip \
              https://github.com/systemed/tilemaker/releases/download/v2.4.0/tilemaker-ubuntu-22.04.zip
            unzip -o tilemaker.zip
            # Binary is at build/tilemaker
            sudo cp build/tilemaker /usr/local/bin/tilemaker
            sudo chmod +x /usr/local/bin/tilemaker
            echo "Installed: $(tilemaker --version 2>&1 | head -1)"
          fi

      - name: Get Tilemaker config
        run: |
          cd /home/yc-user/osm
          if [ ! -f "process.lua" ]; then
            curl -L -o process.lua \
              https://raw.githubusercontent.com/systemed/tilemaker/master/resources/process-openmaptiles.lua
            curl -L -o config.json \
              https://raw.githubusercontent.com/systemed/tilemaker/master/resources/config-openmaptiles.json
            echo "Config downloaded"
          else
            echo "Config already present"
          fi

      - name: Build MBTiles
        run: |
          cd /home/yc-user/osm
          if [ ! -f "kaliningrad.mbtiles" ]; then
            echo "Building tiles — takes 5-15 min..."
            tilemaker \
              --input  kaliningrad.osm.pbf \
              --output kaliningrad.mbtiles \
              --config config.json \
              --process process.lua \
              --bbox 19.0,54.0,23.0,56.0
            echo "Done: $(du -sh kaliningrad.mbtiles)"
          else
            echo "Already built: $(du -sh kaliningrad.mbtiles)"
          fi

      - name: Write tileserver config
        run: |
          cat > /home/yc-user/osm/config/tileserver-config.json << 'TILECONF'
{
  "options": {
    "paths": {
      "root": "/data",
      "mbtiles": "/data"
    }
  },
  "data": {
    "kaliningrad": {
      "mbtiles": "kaliningrad.mbtiles"
    }
  }
}
TILECONF
          echo "Config written"

      - name: Write tileserver docker-compose
        run: |
          cat > /home/yc-user/osm/docker-compose.yml << 'COMPOSE'
version: "3.8"
services:
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: baltcircle-tileserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /home/yc-user/osm:/data
    command: --config /data/config/tileserver-config.json --port 8080
COMPOSE
          echo "docker-compose written"

      - name: Start tileserver-gl
        run: |
          cd /home/yc-user/osm
          docker compose pull
          docker compose up -d
          echo "Tileserver started, waiting 20s..."
          sleep 20

      - name: Smoke test
        run: |
          echo "=== Health check ==="
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/ >/dev/null 2>&1; then
              echo "✅ Tileserver responding"
              break
            fi
            echo "Attempt $i/12..."
            sleep 10
          done
          echo ""
          echo "=== Available data ==="
          curl -s http://localhost:8080/data/kaliningrad.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Name:', d.get('name','?')); print('Bounds:', d.get('bounds','?'))" 2>/dev/null || echo "Could not parse response"
          echo ""
          echo "=== Docker logs ==="
          docker logs baltcircle-tileserver --tail 15
