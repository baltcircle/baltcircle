name: OSM Force Rebuild
on: [workflow_dispatch]
jobs:
  rebuild:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: Remove broken files
        run: |
          echo "Before: $(ls -lh /home/yc-user/osm/*.pbf /home/yc-user/osm/*.mbtiles 2>/dev/null)"
          rm -f /home/yc-user/osm/kaliningrad.mbtiles
          rm -f /home/yc-user/osm/kaliningrad.osm.pbf
          echo "Removed"

      - name: Download OSM PBF
        run: |
          cd /home/yc-user/osm
          echo "Downloading..."
          curl -L --retry 3 --retry-delay 5 -o kaliningrad.osm.pbf \
            "https://download.geofabrik.de/russia/kaliningradskaya-oblast-latest.osm.pbf"
          echo "Downloaded: $(du -sh kaliningrad.osm.pbf)"
          ls -lh kaliningrad.osm.pbf

      - name: Build MBTiles
        run: |
          cd /home/yc-user/osm
          tilemaker \
            --input kaliningrad.osm.pbf \
            --output kaliningrad.mbtiles \
            --config config.json \
            --process process.lua \
            --bbox 19.0,54.0,23.0,56.0 \
            --threads 2
          echo "Result: $(du -sh kaliningrad.mbtiles)"

      - name: Restart tileserver
        run: |
          cd /home/yc-user/osm
          docker compose restart tileserver
          sleep 5
          curl -s http://localhost:8080/data/kaliningrad.json | grep -o '"minzoom":[0-9]*'

      - name: Write result
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          MBT=$(ls -lh /home/yc-user/osm/kaliningrad.mbtiles 2>/dev/null | awk '{print $5}')
          PBF=$(ls -lh /home/yc-user/osm/kaliningrad.osm.pbf 2>/dev/null | awk '{print $5}')
          T10=$(curl -so /dev/null -w '%{http_code}' "http://localhost:8080/data/kaliningrad/10/570/325.pbf")
          S10=$(curl -s "http://localhost:8080/data/kaliningrad/10/570/325.pbf" | wc -c)
          printf "mbt=%s\npbf=%s\nts_z10=%s\nts_z10_size=%s\n" "$MBT" "$PBF" "$T10" "$S10" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: osm rebuild result [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo "Written"
