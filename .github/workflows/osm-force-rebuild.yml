name: OSM Force Rebuild
on: [workflow_dispatch]
jobs:
  rebuild:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: Run tilemaker and capture output
        run: |
          cd /home/yc-user/osm
          tilemaker \
            --input kaliningrad.osm.pbf \
            --output kaliningrad.mbtiles \
            --config config.json \
            --process process.lua \
            --bbox 19.0,54.0,23.0,56.0 \
            --threads 2 > /tmp/tilemaker.log 2>&1 || true
          tail -30 /tmp/tilemaker.log

      - name: Write tilemaker log to repo
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ENC=$(base64 -w0 /tmp/tilemaker.log)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/tilemaker.log" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
              "https://api.github.com/repos/baltcircle/baltcircle/contents/tilemaker.log" \
              -d "{\"message\":\"ci: tilemaker log [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo "Updated"
          else
            curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
              "https://api.github.com/repos/baltcircle/baltcircle/contents/tilemaker.log" \
              -d "{\"message\":\"ci: tilemaker log [skip ci]\",\"content\":\"$ENC\"}" && echo "Created"
          fi
