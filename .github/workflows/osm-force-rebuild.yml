name: OSM Force Rebuild
on: [workflow_dispatch]
jobs:
  rebuild:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: Remove broken files and re-download
        run: |
          cd /home/yc-user/osm
          rm -f kaliningrad.osm.pbf kaliningrad.mbtiles
          echo "Downloading from Geofabrik (correct URL)..."
          curl -L --retry 3 --retry-delay 5 --max-time 300 \
            -o kaliningrad.osm.pbf \
            "https://download.geofabrik.de/russia/kaliningrad-latest.osm.pbf"
          echo "Downloaded: $(du -sh kaliningrad.osm.pbf)"
          ls -lh kaliningrad.osm.pbf

      - name: Build MBTiles
        run: |
          cd /home/yc-user/osm
          echo "Building tiles..."
          tilemaker \
            --input kaliningrad.osm.pbf \
            --output kaliningrad.mbtiles \
            --config config.json \
            --process process.lua \
            --bbox 19.0,54.0,23.0,56.0 \
            --threads 2
          echo "Result: $(du -sh kaliningrad.mbtiles)"
          ls -lh kaliningrad.mbtiles

      - name: Restart tileserver
        run: |
          cd /home/yc-user/osm
          docker compose restart tileserver
          sleep 8
          echo "Smoke: $(curl -so /dev/null -w '%{http_code}' http://localhost:8080/data/kaliningrad.json)"
          echo "Tile z10: $(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/data/kaliningrad/10/570/325.pbf')"
          echo "Tile z10 size: $(curl -s 'http://localhost:8080/data/kaliningrad/10/570/325.pbf' | wc -c) bytes"

      - name: Write result
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          MBT=$(ls -lh /home/yc-user/osm/kaliningrad.mbtiles 2>/dev/null | awk '{print $5}')
          T10=$(curl -so /dev/null -w '%{http_code}' "http://localhost:8080/data/kaliningrad/10/570/325.pbf")
          S10=$(curl -s "http://localhost:8080/data/kaliningrad/10/570/325.pbf" | wc -c)
          PROXY=$(curl -so /dev/null -w '%{http_code}' "http://localhost:5000/tiles/data/kaliningrad/10/570/325.pbf")
          PROXY_S=$(curl -s "http://localhost:5000/tiles/data/kaliningrad/10/570/325.pbf" | wc -c)
          printf "mbt=%s\nts_z10=%s\nts_z10_size=%s\nproxy_z10=%s\nproxy_z10_size=%s\n" \
            "$MBT" "$T10" "$S10" "$PROXY" "$PROXY_S" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: osm rebuild2 result [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo "Written"
