name: Deploy BaltCircle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baltcircle-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on Yandex Cloud VM
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      # The one-shot migration step below mounts the runner workspace into a
      # root container to run `npm ci`, which leaves root-owned files behind.
      # actions/checkout's `git clean -ffdx` then cannot delete them and the
      # checkout fails on every subsequent run. This pre-checkout step uses a
      # short-lived root container to reset ownership of the workspace back to
      # the runner user so checkout can clean it. No-op when the dir is absent
      # or already owned correctly.
      - name: Reclaim workspace ownership (pre-checkout)
        run: |
          set -e
          WORKDIR="${{ github.workspace }}"
          if [ -d "$WORKDIR" ]; then
            HOST_UID=$(id -u)
            HOST_GID=$(id -g)
            docker run --rm \
              -v "$WORKDIR":/ws \
              alpine:3.20 \
              chown -R "$HOST_UID:$HOST_GID" /ws || true
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      # One-shot data migration: legacy SQLite (data.db in the old Docker volume)
      # -> managed PostgreSQL. Runs only if the legacy volume still holds a
      # data.db AND the migration has not been marked done. The migrate script is
      # idempotent (ON CONFLICT DO NOTHING), and a marker file in the volume stops
      # it from re-running on every deploy. Uses host networking so the container
      # reaches the managed PG the same way the VM does.
      - name: Migrate legacy SQLite data to PostgreSQL (one-shot)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          LEGACY_VOLUME="baltcicl_baltcircle_data"

          if [ -z "$DATABASE_URL" ]; then
            echo "❌ Secret DATABASE_URL is not set — cannot migrate or deploy. Set it in repo Settings → Secrets → Actions."
            exit 1
          fi

          if ! docker volume inspect "$LEGACY_VOLUME" >/dev/null 2>&1; then
            echo "ℹ️ Legacy volume $LEGACY_VOLUME not found — nothing to migrate (fresh install). Skipping."
            exit 0
          fi

          # Check the marker + presence of data.db inside the legacy volume.
          STATE=$(docker run --rm -v "$LEGACY_VOLUME":/legacy:ro alpine:3.20 sh -c '
            if [ -f /legacy/.migrated-to-pg ]; then echo DONE;
            elif [ -f /legacy/data.db ]; then echo PENDING;
            else echo NODB; fi')

          if [ "$STATE" = "DONE" ]; then
            echo "✅ Migration already completed earlier (marker present). Skipping."
            exit 0
          fi
          if [ "$STATE" = "NODB" ]; then
            echo "ℹ️ No data.db in legacy volume — nothing to migrate. Skipping."
            exit 0
          fi

          echo "➡️ Stopping old app container so it releases the SQLite file (WAL flush)..."
          docker compose stop baltcircle || true

          echo "➡️ Running one-shot SQLite → PostgreSQL migration..."
          # Legacy volume mounted read-write on purpose: the migrate script runs
          # wal_checkpoint(TRUNCATE) to fold data.db-wal into data.db before
          # reading, so the freshest transactions are not lost.
          # Run npm ci in a container-internal copy of the repo (/build) instead
          # of directly in the mounted workspace, so root-owned node_modules are
          # never written into $GITHUB_WORKSPACE (which would break the next
          # checkout's git clean). The workspace is mounted read-only as /src.
          docker run --rm \
            --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e SKIP_DEMO_SEED=1 \
            -e SQLITE_PATH=/legacy/data.db \
            -v "$GITHUB_WORKSPACE":/src:ro \
            -v "$LEGACY_VOLUME":/legacy \
            -w /build \
            -e NODE_EXTRA_CA_CERTS=/tmp/yc-root.crt \
            node:20-bookworm-slim \
            bash -c '
              set -e
              apt-get update >/dev/null && apt-get install -y --no-install-recommends python3 make g++ curl ca-certificates rsync >/dev/null
              curl -fsSL -o /tmp/yc-root.crt https://storage.yandexcloud.net/cloud-certs/CA.pem
              mkdir -p /build
              rsync -a --exclude node_modules /src/ /build/
              npm ci
              echo "— creating schema (no demo seed)"
              npx tsx -e "import(\"./server/db/bootstrap\").then(m=>m.bootstrapReady).then(()=>process.exit(0)).catch(e=>{console.error(e);process.exit(1);})"
              echo "— dry run"
              npx tsx script/migrate-sqlite-to-pg.ts --dry-run
              echo "— real migration"
              npx tsx script/migrate-sqlite-to-pg.ts
            '

          # Mark the volume so future deploys skip migration.
          docker run --rm -v "$LEGACY_VOLUME":/legacy alpine:3.20 sh -c 'date -u +%FT%TZ > /legacy/.migrated-to-pg'
          echo "✅ Migration finished and marked complete."

      - name: Rebuild and restart Docker app
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          VITE_YANDEX_MAPS_API_KEY: ${{ secrets.VITE_YANDEX_MAPS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMS_PROVIDER: ${{ secrets.SMS_PROVIDER }}
          SIGMASMS_TOKEN: ${{ secrets.SIGMASMS_TOKEN }}
          SIGMASMS_SENDER: ${{ secrets.SIGMASMS_SENDER }}
          OTP_SECRET: ${{ secrets.OTP_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ADMIN_PHONE_NUMBERS: ${{ secrets.ADMIN_PHONE_NUMBERS }}
          TBANK_TERMINAL_KEY: ${{ secrets.TBANK_TERMINAL_KEY }}
          TBANK_PASSWORD: ${{ secrets.TBANK_PASSWORD }}
          TBANK_API_BASE: ${{ secrets.TBANK_API_BASE }}
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL }}
          RUSENDER_API_KEY: ${{ secrets.RUSENDER_API_KEY }}
          RUSENDER_KEY_ID: ${{ secrets.RUSENDER_KEY_ID }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          VK_APP_ID: ${{ secrets.VK_APP_ID }}
          VK_SECURE_KEY: ${{ secrets.VK_SECURE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_CONTACT: ${{ secrets.VAPID_CONTACT }}
        run: |
          set -e
          docker compose up -d --build --force-recreate
          docker image prune -f
          docker ps --filter "name=baltcircle"

      - name: Smoke test local app
        run: |
          set -e
          wait_for() {
            local url="$1"
            local label="$2"
            local deadline=$(( $(date +%s) + 120 ))
            until curl --fail --silent --max-time 10 "$url" >/dev/null; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "Smoke test failed: $label ($url) not healthy within 120s"
                exit 1
              fi
              echo "Waiting for $label ($url)..."
              sleep 5
            done
            echo "OK: $label ($url)"
          }
          wait_for http://127.0.0.1:5000 "app root"
          wait_for http://127.0.0.1:5000/api/bikes "bikes API"
          wait_for http://127.0.0.1:5000/api/parkings "parkings API"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Деплой завершён успешно: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Коммит: ${{ github.sha }}"
          echo "Автор: ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Деплой завершился с ошибкой: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "Коммит: ${{ github.sha }}"
          echo "===== docker ps ====="
          docker ps -a --filter "name=baltcircle" || true
          echo "===== app container logs (last 200) ====="
          docker logs --tail 200 baltcircle-mvp 2>&1 || true
