name: Deploy BaltCircle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baltcircle-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on Yandex Cloud VM
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild and restart Docker app
        run: |
          set -e
          docker compose up -d --build
          docker image prune -f
          docker ps --filter "name=baltcircle"

      - name: Smoke test local app
        run: |
          set -e
          curl --fail --max-time 30 http://127.0.0.1:5000 >/dev/null
          curl --fail --max-time 30 http://127.0.0.1:5000/api/bikes >/dev/null
