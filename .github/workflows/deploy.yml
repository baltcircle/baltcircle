name: Deploy BaltCircle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baltcircle-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Yandex Cloud VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.SERVER_USER }}/baltcicl"
          rm: true
          overwrite: true

      - name: Rebuild and restart Docker app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.SERVER_USER }}/baltcicl
            docker compose up -d --build
            docker image prune -f
            docker ps --filter "name=baltcircle"
