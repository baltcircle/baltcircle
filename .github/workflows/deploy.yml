name: Deploy BaltCircle

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: baltcircle-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy on Yandex Cloud VM
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild and restart Docker app
        env:
          # Forwarded into the docker-compose build arg so Vite can inline it
          # into the client bundle at build time.
          VITE_YANDEX_MAPS_API_KEY: ${{ secrets.VITE_YANDEX_MAPS_API_KEY }}
          # SMS OTP runtime config — consumed by the backend container at
          # runtime (docker-compose `environment:`), never inlined into the
          # client bundle. Secrets are passed through, not hardcoded.
          SMS_PROVIDER: ${{ secrets.SMS_PROVIDER }}
          SMSRU_API_ID: ${{ secrets.SMSRU_API_ID }}
          OTP_SECRET: ${{ secrets.OTP_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          # Comma-separated phone numbers granted the admin role (temporary
          # bootstrap). Passed through to the container at runtime, never
          # hardcoded. Empty when the secret is unset -> no auto-admins.
          ADMIN_PHONE_NUMBERS: ${{ secrets.ADMIN_PHONE_NUMBERS }}
        run: |
          set -e
          docker compose up -d --build
          docker image prune -f
          docker ps --filter "name=baltcircle"

      - name: Smoke test local app
        run: |
          set -e
          # The container may still be restarting right after `compose up`,
          # so retry each endpoint for up to ~120s instead of failing instantly.
          wait_for() {
            local url="$1"
            local label="$2"
            local deadline=$(( $(date +%s) + 120 ))
            until curl --fail --silent --max-time 10 "$url" >/dev/null; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "Smoke test failed: $label ($url) not healthy within 120s"
                exit 1
              fi
              echo "Waiting for $label ($url)..."
              sleep 5
            done
            echo "OK: $label ($url)"
          }
          wait_for http://127.0.0.1:5000 "app root"
          wait_for http://127.0.0.1:5000/api/bikes "bikes API"
          wait_for http://127.0.0.1:5000/api/parkings "parkings API"
