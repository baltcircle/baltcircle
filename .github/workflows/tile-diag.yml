name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check fonts
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # Check tileserver fonts endpoint
          FONTS=$(curl -s http://localhost:8080/fonts.json 2>/dev/null | head -c 500)
          FONT_LIST=$(curl -so /dev/null -w '%{http_code}' http://localhost:8080/fonts.json)
          # Try Noto Sans Regular glyph range
          NOTO=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/fonts/Noto%20Sans%20Regular/0-255.pbf')
          NOTO_SZ=$(curl -s 'http://localhost:8080/fonts/Noto%20Sans%20Regular/0-255.pbf' | wc -c)
          # Try Open Sans
          OPEN=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/fonts/Open%20Sans%20Regular/0-255.pbf')
          # tileserver catalog
          CAT=$(curl -s http://localhost:8080/ | python3 -c "import json,sys; d=json.load(sys.stdin); print(list(d.get('fonts',{}).keys())[:5])" 2>/dev/null || echo "no catalog")
          printf "font_list_http=%s\nnoto_http=%s noto_bytes=%s\nopen_sans_http=%s\nfonts_json=%s\ncatalog_fonts=%s\n" \
            "$FONT_LIST" "$NOTO" "$NOTO_SZ" "$OPEN" "$FONTS" "$CAT" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: check [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}" && echo OK
