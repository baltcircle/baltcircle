name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check glyphs proxy
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          G1=$(curl -so /dev/null -w '%{http_code}' --max-time 8 'http://localhost:5000/glyphs/Noto%20Sans%20Regular/0-255.pbf')
          G1S=$(curl -s --max-time 8 'http://localhost:5000/glyphs/Noto%20Sans%20Regular/0-255.pbf' | wc -c)
          # Check what place layer returns
          PLACE=$(curl -s 'http://localhost:8080/data/kaliningrad.json' | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('vector_layers','?'))" 2>/dev/null | head -c 300)
          printf "glyphs_http=%s bytes=%s\nvector_layers=%s\n" "$G1" "$G1S" "$PLACE" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: check [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}" && echo OK
