name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check mbtiles
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          MBT_SIZE=$(ls -lh /home/yc-user/osm/kaliningrad.mbtiles 2>/dev/null | awk '{print $5}')
          MBT_TILES=$(sqlite3 /home/yc-user/osm/kaliningrad.mbtiles "SELECT count(*) FROM tiles" 2>/dev/null || echo "sqlite3_error")
          MBT_META=$(sqlite3 /home/yc-user/osm/kaliningrad.mbtiles "SELECT name, value FROM metadata LIMIT 10" 2>/dev/null || echo "meta_error")
          TS_CONTAINER=$(docker inspect baltcircle-tileserver --format '{{.State.Status}} volumes:{{range .Mounts}}{{.Source}}:{{.Destination}},{{end}}' 2>/dev/null || echo "no_container")
          
          printf "mbt_size=%s\nmbt_tiles=%s\nts_container=%s\nmbt_meta=%s\n" \
            "$MBT_SIZE" "$MBT_TILES" "$TS_CONTAINER" "$MBT_META" > /tmp/r.txt
          cat /tmp/r.txt
          
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: diag mbtiles [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo OK
