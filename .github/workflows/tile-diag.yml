name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    steps:
      - uses: actions/checkout@v4
      - name: Proxy diagnostics
        run: |
          {
            echo "tileserver_json=$(curl -so /dev/null -w '%{http_code}' http://localhost:8080/data/kaliningrad.json)"
            echo "tileserver_tile_z11=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/data/kaliningrad/11/1140/650.pbf')"
            echo "proxy_json=$(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)"
            echo "proxy_tile_z11=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf')"
            echo "tiles_url=$(curl -s http://localhost:5000/tiles/data/kaliningrad.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("tiles", ["NONE"])[0])' 2>/dev/null || echo PARSE_ERROR)"
          } > /tmp/diag-result.txt
          cat /tmp/diag-result.txt
          cp /tmp/diag-result.txt diag-result.txt
          git config user.email "ci@baltcircle"
          git config user.name "CI"
          git add diag-result.txt
          git commit -m "ci: diag result [skip ci]"
          git push
