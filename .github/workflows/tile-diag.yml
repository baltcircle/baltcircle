name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    steps:
      - name: nginx and network info
        run: |
          echo "=== nginx sites ==="
          ls /etc/nginx/sites-enabled/ 2>/dev/null
          cat /etc/nginx/sites-enabled/* 2>/dev/null
          echo "=== nginx sites-available ==="
          ls /etc/nginx/sites-available/ 2>/dev/null
          echo "=== listening ports ==="
          ss -tlnp 2>/dev/null | grep -E "5000|8080|80|443"
