name: Regen Tiles Extended
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  regen:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Download data and generate extended tiles
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd /home/yc-user/osm
          echo "=== Disk before ===" && df -h /

          echo "[1/7] osmium already installed: $(which osmium)"

          echo "[2/7] Downloading simplified coastline (22 MB)..."
          if [ ! -f "coastline/simplified_water_polygons.shp" ]; then
            curl -L --progress-bar -o coastline.zip \
              "https://osmdata.openstreetmap.de/download/simplified-water-polygons-split-3857.zip"
            mkdir -p coastline
            unzip -o coastline.zip -d coastline_tmp
            find coastline_tmp -name "*.shp" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.dbf" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.shx" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.prj" -exec cp {} coastline/ \;
            rm -rf coastline_tmp coastline.zip
            ls -lh coastline/
          else
            echo "Coastline already present: $(ls coastline/)"
          fi

          echo "[3/7] Downloading Lithuania (211 MB)..."
          [ -f "lithuania.osm.pbf" ] || curl -L --progress-bar -o lithuania.osm.pbf \
            "https://download.geofabrik.de/europe/lithuania-latest.osm.pbf"

          echo "[4/7] Downloading Latvia (132 MB)..."
          [ -f "latvia.osm.pbf" ] || curl -L --progress-bar -o latvia.osm.pbf \
            "https://download.geofabrik.de/europe/latvia-latest.osm.pbf"

          echo "[5/7] Downloading Poland subregions..."
          [ -f "warminsko.osm.pbf" ] || curl -L --progress-bar -o warminsko.osm.pbf \
            "https://download.geofabrik.de/europe/poland/warminsko-mazurskie-latest.osm.pbf"
          [ -f "pomorskie.osm.pbf" ] || curl -L --progress-bar -o pomorskie.osm.pbf \
            "https://download.geofabrik.de/europe/poland/pomorskie-latest.osm.pbf"

          echo "=== Disk after downloads ===" && df -h /

          echo "[6/7] Clipping each file to bbox [17.5,52.0,27.0,58.0] then merging..."
          BBOX="17.5,52.0,27.0,58.0"
          CLIPPED=""
          for SRC in kaliningrad.osm.pbf lithuania.osm.pbf latvia.osm.pbf warminsko.osm.pbf pomorskie.osm.pbf; do
            if [ -f "$SRC" ]; then
              OUT="clipped_${SRC}"
              echo "  Clipping $SRC..."
              osmium extract --bbox $BBOX "$SRC" -o "$OUT" --overwrite
              CLIPPED="$CLIPPED $OUT"
            fi
          done
          echo "Clipped files: $CLIPPED"
          echo "Merging clipped files..."
          osmium merge $CLIPPED -o extended.osm.pbf --overwrite
          rm -f $CLIPPED
          echo "Extended: $(du -sh extended.osm.pbf)"
          df -h /

          echo "[7/7] Updating config and running tilemaker..."
          python3 -c "import json; f=open('config.json'); cfg=json.load(f); f.close(); cfg['layers']['ocean']['source']='coastline/simplified_water_polygons.shp'; f2=open('config.json','w'); json.dump(cfg,f2,indent=2); f2.close(); print('config.json updated')"

          tilemaker \
            --input extended.osm.pbf \
            --output extended.mbtiles \
            --config config.json \
            --process process.lua

          echo "Result: $(du -sh extended.mbtiles)"
          cp extended.mbtiles kaliningrad.mbtiles
          docker restart baltcircle-tileserver
          sleep 8
          docker ps | grep tileserver
          curl -s "http://localhost:8080/data/kaliningrad.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('bounds:', d.get('bounds')); print('zoom:', d.get('minzoom'), '-', d.get('maxzoom'))"
          echo "ALL DONE"

      - name: Report result
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/yc-user/osm
          {
            echo "mbtiles: $(du -sh kaliningrad.mbtiles 2>/dev/null)"
            echo "disk: $(df -h / | tail -1)"
            curl -s "http://localhost:8080/data/kaliningrad.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('bounds:', d.get('bounds'))" 2>/dev/null || echo "tileserver not responding"
          } > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: regen result\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}"
