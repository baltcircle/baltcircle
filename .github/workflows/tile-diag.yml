name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: full check
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # tileserver
          TS=$(curl -so /dev/null -w '%{http_code}' http://localhost:8080/data/kaliningrad.json)
          TS10=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/data/kaliningrad/10/570/325.pbf')
          TS10S=$(curl -s 'http://localhost:8080/data/kaliningrad/10/570/325.pbf' | wc -c)
          # proxy
          P=$(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)
          P10=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:5000/tiles/data/kaliningrad/10/570/325.pbf')
          P10S=$(curl -s 'http://localhost:5000/tiles/data/kaliningrad/10/570/325.pbf' | wc -c)
          # tiles url rewrite
          TU=$(curl -s http://localhost:5000/tiles/data/kaliningrad.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('tiles',['NONE'])[0])" 2>/dev/null)
          # maplibre css in html
          HTML=$(curl -s http://localhost:5000/ | grep -c 'maplibre')
          printf "ts_json=%s\nts_tile_z10=%s\nts_tile_bytes=%s\nproxy_json=%s\nproxy_tile=%s\nproxy_bytes=%s\ntiles_url=%s\nmaplibre_in_html=%s\n" \
            "$TS" "$TS10" "$TS10S" "$P" "$P10" "$P10S" "$TU" "$HTML" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: check [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo OK
