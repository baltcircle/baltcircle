name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    steps:
      - name: Proxy diagnostics
        run: |
          echo "=== tileserver direct ==="
          STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:8080/data/kaliningrad.json)
          echo "tileserver json: $STATUS"
          STATUS2=$(curl -so /dev/null -w "%{http_code}" "http://localhost:8080/data/kaliningrad/11/1140/650.pbf")
          echo "tileserver tile z11: $STATUS2"
          echo "=== app proxy ==="
          STATUS3=$(curl -so /dev/null -w "%{http_code}" http://localhost:5000/tiles/data/kaliningrad.json)
          echo "proxy json: $STATUS3"
          STATUS4=$(curl -so /dev/null -w "%{http_code}" "http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf")
          echo "proxy tile z11: $STATUS4"
          echo "=== tilejson tiles field ==="
          curl -s http://localhost:5000/tiles/data/kaliningrad.json | python3 -c "import json,sys; d=json.load(sys.stdin); print('tiles:', d.get('tiles'))" 2>/dev/null || echo "parse failed"
