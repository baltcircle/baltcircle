name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    steps:
      - name: Full diagnostics
        run: |
          echo "=== NGINX CONFIG ==="
          cat /etc/nginx/sites-enabled/* 2>/dev/null || cat /etc/nginx/nginx.conf 2>/dev/null | grep -A20 "server {" | head -60
          echo "=== TILESERVER DIRECT ==="
          curl -so /dev/null -w "tileserver json HTTP: %{http_code}\n" http://localhost:8080/data/kaliningrad.json
          curl -so /dev/null -w "tileserver tile z11 HTTP: %{http_code}\n" "http://localhost:8080/data/kaliningrad/11/1140/650.pbf"
          echo "=== APP PROXY (port 5000) ==="
          curl -so /dev/null -w "app proxy json HTTP: %{http_code}\n" http://localhost:5000/tiles/data/kaliningrad.json
          curl -so /dev/null -w "app proxy tile HTTP: %{http_code}\n" "http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf"
          echo "=== TILES URL IN TILEJSON ==="
          curl -s http://localhost:5000/tiles/data/kaliningrad.json | python3 -c "import json,sys; d=json.load(sys.stdin); t=d.get('tiles',['NONE']); print('tiles[0]:', t[0] if t else 'NONE')" 2>&1
          echo "=== DOCKER CONTAINERS ==="
          docker ps --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}" 2>/dev/null
