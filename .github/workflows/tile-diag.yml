name: Regen Tiles Extended
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  regen:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Download data and generate extended tiles
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "=== RAM ==="
          free -h
          echo "=== Disk ==="
          df -h /
          cd /home/yc-user/osm
          echo "=== Existing files ==="
          ls -lh *.pbf *.mbtiles 2>/dev/null || echo "none"
          echo "=== osmium version ==="
          osmium --version 2>&1 | head -3
          echo "=== tilemaker version ==="
          tilemaker --version 2>&1 | head -3

      - name: Report result
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/yc-user/osm
          {
            echo "mbtiles: $(du -sh kaliningrad.mbtiles 2>/dev/null)"
            echo "disk: $(df -h / | tail -1)"
            curl -s "http://localhost:8080/data/kaliningrad.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('bounds:', d.get('bounds'))" 2>/dev/null || echo "tileserver not responding"
          } > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: regen result\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}"
