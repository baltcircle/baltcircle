name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: final proxy check
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          R1=$(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)
          R2=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf')
          R3=$(curl -s http://localhost:5000/tiles/data/kaliningrad.json 2>/dev/null | grep -o '"tiles":\["[^"]*"' | head -1)
          
          echo "proxy_json=$R1" > /tmp/r.txt
          echo "proxy_tile=$R2" >> /tmp/r.txt
          echo "tiles_url=$R3" >> /tmp/r.txt
          cat /tmp/r.txt
          
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: final check [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" \
            && echo "PUSHED" || echo "FAILED"
