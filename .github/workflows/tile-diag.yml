name: Test Sudo and Osmium
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: test sudo and osmium install
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "=== SUDO TEST ===" > /tmp/test-result.txt
          sudo echo "sudo works" >> /tmp/test-result.txt 2>&1 || echo "sudo FAILED: $?" >> /tmp/test-result.txt
          echo "=== APT OSMIUM ===" >> /tmp/test-result.txt
          sudo apt-get install -y osmium-tool 2>&1 | tail -3 >> /tmp/test-result.txt
          echo "=== OSMIUM WHICH ===" >> /tmp/test-result.txt
          which osmium >> /tmp/test-result.txt 2>&1 || echo "osmium not found" >> /tmp/test-result.txt
          echo "=== WHOAMI ===" >> /tmp/test-result.txt
          whoami >> /tmp/test-result.txt
          id >> /tmp/test-result.txt
          echo "=== DISK ===" >> /tmp/test-result.txt
          df -h / >> /tmp/test-result.txt
          cat /tmp/test-result.txt
          ENC=$(base64 -w0 /tmp/test-result.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: test result\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}" && echo OK
