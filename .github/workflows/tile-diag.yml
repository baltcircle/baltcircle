name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check proxy
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          D1=$(docker exec baltcircle-mvp grep -c "tile-proxy" /app/dist/index.cjs 2>/dev/null || echo "ERR")
          D2=$(docker exec baltcircle-mvp grep -c "app.use" /app/dist/index.cjs 2>/dev/null || echo "ERR")
          R1=$(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)
          R2=$(curl -s http://localhost:5000/tiles/data/kaliningrad.json 2>/dev/null | head -c 200)
          printf "dist_tile_proxy=%s\ndist_app_use_count=%s\nproxy_json_http=%s\nproxy_json_body=%.150s\n" \
            "$D1" "$D2" "$R1" "$R2" > /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt \
            | grep -o '"sha":"[^"]*"' | head -1 | cut -d'"' -f4)
          curl -sf -X PUT -H "Authorization: token $TOKEN" \
            -d "{\"message\":\"ci: diag v11 [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" \
            https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt || true
