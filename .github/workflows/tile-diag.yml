name: Regen Tiles Extended
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  regen:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Generate extended tiles
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd /home/yc-user/osm
          echo "=== RAM ===" && free -h
          echo "=== Disk ===" && df -h /

          echo "[1/5] Adding swap if not present..."
          if [ "$(swapon --show | wc -l)" -eq 0 ]; then
            sudo fallocate -l 4G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            grep -q swapfile /etc/fstab || echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
          fi
          free -h

          echo "[2/5] Checking coastline shapefile..."
          if [ ! -f "coastline/simplified_water_polygons.shp" ]; then
            curl -L --progress-bar -o coastline.zip "https://osmdata.openstreetmap.de/download/simplified-water-polygons-split-3857.zip"
            mkdir -p coastline
            unzip -o coastline.zip -d coastline_tmp
            find coastline_tmp -name "*.shp" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.dbf" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.shx" -exec cp {} coastline/ \;
            find coastline_tmp -name "*.prj" -exec cp {} coastline/ \;
            rm -rf coastline_tmp coastline.zip
            echo "Coastline OK"
          else
            echo "Coastline already present: $(ls -lh coastline/*.shp)"
          fi

          echo "[3/5] Downloading fresh border region via Overpass API (bbox: 18.5,53.3,24.8,57.2)..."
          rm -f border-region.osm.pbf border-region.osm
          BBOX="18.5,53.3,24.8,57.2"
          QUERY="[out:xml][timeout:900][bbox:${BBOX}];(node;<;>;);out body;"
          SUCCESS=0
          for MIRROR in "https://overpass-api.de/api/interpreter" "https://overpass.kumi.systems/api/interpreter" "https://lz4.overpass-api.de/api/interpreter"; do
            echo "Trying $MIRROR..."
            curl -f --max-time 900 --retry 1 --progress-bar -d "data=${QUERY}" "$MIRROR" -o border-region.osm
            SIZE=$(stat -c%s border-region.osm 2>/dev/null || echo 0)
            echo "Downloaded: $(du -sh border-region.osm) (${SIZE} bytes)"
            if [ "$SIZE" -gt 100000 ]; then
              SUCCESS=1
              break
            fi
            echo "Too small, trying next mirror..."
            rm -f border-region.osm
          done
          if [ "$SUCCESS" -eq 0 ]; then
            echo "ERROR: All Overpass mirrors failed"
            exit 1
          fi
          echo "Converting to PBF..."
          osmium cat border-region.osm -o border-region.osm.pbf --overwrite
          rm -f border-region.osm
          echo "border-region PBF: $(du -sh border-region.osm.pbf)"

          echo "[4/5] Updating config.json ocean source..."
          python3 -c "import json; f=open('config.json'); cfg=json.load(f); f.close(); cfg['layers']['ocean']['source']='coastline/simplified_water_polygons.shp'; open('config.json','w').write(json.dumps(cfg,indent=2)); print('ocean source updated')"

          echo "[5/5] Running tilemaker with BOTH inputs..."
          echo "  kaliningrad.osm.pbf: $(du -sh kaliningrad.osm.pbf)"
          echo "  border-region.osm.pbf: $(du -sh border-region.osm.pbf)"
          free -h
          tilemaker \
            --input kaliningrad.osm.pbf \
            --input border-region.osm.pbf \
            --output extended.mbtiles \
            --config config.json \
            --process process.lua
          echo "Result: $(du -sh extended.mbtiles)"
          cp extended.mbtiles kaliningrad.mbtiles
          docker restart baltcircle-tileserver
          sleep 8
          docker ps | grep tileserver
          curl -s "http://localhost:8080/data/kaliningrad.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('bounds:', d.get('bounds')); print('zoom:', d.get('minzoom'),'-',d.get('maxzoom'))"
          echo "ALL DONE"

      - name: Report result
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/yc-user/osm
          { echo "mbtiles: $(du -sh kaliningrad.mbtiles 2>/dev/null)"; echo "disk: $(df -h / | tail -1)"; curl -s "http://localhost:8080/data/kaliningrad.json" | python3 -c "import json,sys; d=json.load(sys.stdin); print('bounds:', d.get('bounds'))" 2>/dev/null || echo "tileserver not responding"; } > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" -d "{\"message\":\"ci: regen result\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}"
