name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: write result
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          R1=$(curl -so /dev/null -w '%{http_code}' http://localhost:8080/data/kaliningrad.json)
          R2=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/data/kaliningrad/11/1140/650.pbf')
          R3=$(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)
          R4=$(curl -so /dev/null -w '%{http_code}' 'http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf')
          NX=$(grep -rh 'server_name\|proxy_pass\|listen' /etc/nginx/sites-enabled/ 2>/dev/null | tr '\n' '|')
          TU=$(curl -s http://localhost:5000/tiles/data/kaliningrad.json 2>/dev/null | grep -o '"tiles":\["[^"]*"' | head -1)
          
          printf "ts_json=%s\nts_tile=%s\nproxy_json=%s\nproxy_tile=%s\nnginx=%s\ntiles_url=%s\n" \
            "$R1" "$R2" "$R3" "$R4" "$NX" "$TU" > /tmp/r.txt
          
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt \
            | grep -o '"sha":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          if [ -n "$SHA" ]; then
            curl -sf -X PUT -H "Authorization: token $TOKEN" \
              -d "{\"message\":\"ci: diag [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" \
              https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt
          else
            curl -sf -X PUT -H "Authorization: token $TOKEN" \
              -d "{\"message\":\"ci: diag [skip ci]\",\"content\":\"$ENC\"}" \
              https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt
          fi
