name: Regen Tiles Extended
on: [workflow_dispatch]
jobs:
  regen:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Install osmium and download data
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          cd /home/yc-user/osm

          echo "[1/7] Install osmium-tool..."
          sudo apt-get install -y osmium-tool 2>&1 | tail -3

          echo "[2/7] Download simplified coastline..."
          if [ ! -f "simplified-water-polygons-split-3857.zip" ]; then
            curl -L -o simplified-water-polygons-split-3857.zip \
              "https://osmdata.openstreetmap.de/download/simplified-water-polygons-split-3857.zip"
          fi
          if [ ! -d "coastline" ]; then
            mkdir -p coastline
            unzip -o simplified-water-polygons-split-3857.zip -d coastline_tmp
            mv coastline_tmp/simplified-water-polygons-split-3857/* coastline/ || \
              mv coastline_tmp/* coastline/
            rm -rf coastline_tmp
          fi
          ls -lh coastline/
          
          echo "[3/7] Download Lithuania..."
          if [ ! -f "lithuania.osm.pbf" ]; then
            curl -L -o lithuania.osm.pbf \
              "https://download.geofabrik.de/europe/lithuania-latest.osm.pbf"
          fi
          echo "Lithuania: $(du -sh lithuania.osm.pbf)"

          echo "[4/7] Download Latvia..."
          if [ ! -f "latvia.osm.pbf" ]; then
            curl -L -o latvia.osm.pbf \
              "https://download.geofabrik.de/europe/latvia-latest.osm.pbf"
          fi
          echo "Latvia: $(du -sh latvia.osm.pbf)"

          echo "[5/7] Download North Poland (Geofabrik Warminsko-Mazurskie + Pomorskie)..."
          # Warmia-Masuria (borders Kaliningrad): ~90 MB
          if [ ! -f "warminsko-mazurskie.osm.pbf" ]; then
            curl -L -o warminsko-mazurskie.osm.pbf \
              "https://download.geofabrik.de/europe/poland/warminsko-mazurskie-latest.osm.pbf" || \
            curl -L -o warminsko-mazurskie.osm.pbf \
              "https://download.geofabrik.de/europe/poland/warminsko-mazurskie_latest.osm.pbf" || \
            echo "WARN: warminsko failed, using bbox extract"
          fi
          # Pomorskie (Baltic coast Poland): ~90 MB
          if [ ! -f "pomorskie.osm.pbf" ]; then
            curl -L -o pomorskie.osm.pbf \
              "https://download.geofabrik.de/europe/poland/pomorskie-latest.osm.pbf" || echo "WARN: pomorskie failed"
          fi

          echo "[6/7] Merge and clip to extended bbox [17.5,52.0,27.0,58.0]..."
          # Merge all PBFs
          osmium merge \
            kaliningrad.osm.pbf \
            lithuania.osm.pbf \
            latvia.osm.pbf \
            warminsko-mazurskie.osm.pbf \
            pomorskie.osm.pbf \
            -o merged-tmp.osm.pbf --overwrite 2>&1 || \
          osmium merge \
            kaliningrad.osm.pbf \
            lithuania.osm.pbf \
            latvia.osm.pbf \
            -o merged-tmp.osm.pbf --overwrite 2>&1
          
          # Clip to bbox
          osmium extract \
            --bbox 17.5,52.0,27.0,58.0 \
            merged-tmp.osm.pbf \
            -o extended.osm.pbf --overwrite
          rm -f merged-tmp.osm.pbf
          echo "Extended PBF: $(du -sh extended.osm.pbf)"
          df -h /

          echo "[7/7] Generate tiles with tilemaker..."
          # Update config.json to point ocean layer to our coastline
          python3 -c "
import json
with open('config.json') as f:
    cfg = json.load(f)
# Fix coastline path
cfg['layers']['ocean']['source'] = 'coastline/simplified_water_polygons.shp'
# Keep maxzoom=14 for full detail
with open('config.json', 'w') as f:
    json.dump(cfg, f, indent=2)
print('config updated')
" 2>&1

          tilemaker \
            --input extended.osm.pbf \
            --output extended.mbtiles \
            --config config.json \
            --process process.lua \
            2>&1 | tail -20
          
          echo "Extended mbtiles: $(du -sh extended.mbtiles)"
          
          # Swap files - tileserver reads from this path
          cp extended.mbtiles kaliningrad.mbtiles
          
          # Restart tileserver to pick up new mbtiles
          docker restart baltcircle-tileserver
          sleep 5
          docker ps | grep tileserver
          echo "DONE"

      - name: Report result
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/yc-user/osm
          echo "mbtiles: $(du -sh kaliningrad.mbtiles 2>/dev/null)" > /tmp/regen-result.txt
          echo "disk: $(df -h / | tail -1)" >> /tmp/regen-result.txt
          echo "tileserver: $(docker ps | grep tileserver)" >> /tmp/regen-result.txt
          ENC=$(base64 -w0 /tmp/regen-result.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: regen result [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}"
