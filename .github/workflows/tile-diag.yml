name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check data files
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "=== OSM DIR FULL TREE ===" > /tmp/sdiag.txt
          find /home/yc-user/osm -type f | sort >> /tmp/sdiag.txt
          echo "=== COASTLINE ===" >> /tmp/sdiag.txt
          find / -name "water_polygons.shp" 2>/dev/null | grep -v proc >> /tmp/sdiag.txt
          echo "=== TILEMAKER VERSION ===" >> /tmp/sdiag.txt
          tilemaker --version >> /tmp/sdiag.txt 2>&1
          echo "=== OSMIUM INSTALLED ===" >> /tmp/sdiag.txt
          which osmium && osmium --version 2>&1 | head -2 >> /tmp/sdiag.txt || echo "not found" >> /tmp/sdiag.txt
          echo "=== DISK ===" >> /tmp/sdiag.txt
          df -h / >> /tmp/sdiag.txt
          cat /tmp/sdiag.txt
          ENC=$(base64 -w0 /tmp/sdiag.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: data diag [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}" && echo OK
