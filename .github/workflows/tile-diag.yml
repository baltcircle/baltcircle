name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: diagnostics
        run: |
          set +e
          echo "## Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "**ports:**" >> $GITHUB_STEP_SUMMARY
          ss -tlnp | grep -E "5000|8080|80 " >> $GITHUB_STEP_SUMMARY || true
          echo "**nginx sites:**" >> $GITHUB_STEP_SUMMARY
          ls /etc/nginx/sites-enabled/ >> $GITHUB_STEP_SUMMARY || true
          echo "**nginx server_name/proxy_pass:**" >> $GITHUB_STEP_SUMMARY
          grep -h -E "server_name|proxy_pass|listen" /etc/nginx/sites-enabled/* 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
          echo "**tileserver direct json:** $(curl -so /dev/null -w '%{http_code}' http://localhost:8080/data/kaliningrad.json)" >> $GITHUB_STEP_SUMMARY
          echo "**tileserver direct tile z11:** $(curl -so /dev/null -w '%{http_code}' 'http://localhost:8080/data/kaliningrad/11/1140/650.pbf')" >> $GITHUB_STEP_SUMMARY
          echo "**proxy json (5000):** $(curl -so /dev/null -w '%{http_code}' http://localhost:5000/tiles/data/kaliningrad.json)" >> $GITHUB_STEP_SUMMARY
          echo "**proxy tile (5000):** $(curl -so /dev/null -w '%{http_code}' 'http://localhost:5000/tiles/data/kaliningrad/11/1140/650.pbf')" >> $GITHUB_STEP_SUMMARY
          echo "**tiles_url in json:** $(curl -s http://localhost:5000/tiles/data/kaliningrad.json 2>/dev/null | grep -o '"tiles":\["[^"]*"' | head -1)" >> $GITHUB_STEP_SUMMARY
