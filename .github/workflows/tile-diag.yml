name: Regen Tiles Extended
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  regen:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Diagnose tilemaker multi-input
        run: |
          set -e
          cd /home/yc-user/osm
          echo "=== tilemaker version ==="
          tilemaker --version 2>&1 || true
          /usr/local/bin/tilemaker --version 2>&1 || true
          echo "=== file sizes ==="
          ls -lh *-clipped.osm.pbf kaliningrad.osm.pbf 2>/dev/null || echo "no clipped files"
          echo "=== test: tilemaker with SINGLE extra input ==="
          tilemaker \
            --input kaliningrad.osm.pbf \
            --input lithuania-clipped.osm.pbf \
            --output test-2files.mbtiles \
            --config config.json \
            --process process.lua
          echo "2-file result: $(du -sh test-2files.mbtiles)"
          rm -f test-2files.mbtiles

      - name: Report result
        if: always()
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /home/yc-user/osm
          { echo "tilemaker: $(tilemaker --version 2>&1 | head -1)"; echo "disk: $(df -h / | tail -1)"; free -h; } > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" -d "{\"message\":\"ci: diag\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}"
