name: Tile Diag
on: [workflow_dispatch]
jobs:
  diag:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - name: check external fonts
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          # Test protomaps GitHub Pages fonts
          P1=$(curl -so /dev/null -w '%{http_code}' --max-time 5 'https://protomaps.github.io/basemaps-assets/fonts/Noto%20Sans%20Regular/0-255.pbf')
          P1S=$(curl -s --max-time 5 'https://protomaps.github.io/basemaps-assets/fonts/Noto%20Sans%20Regular/0-255.pbf' | wc -c)
          # Test orangemug
          O1=$(curl -so /dev/null -w '%{http_code}' --max-time 5 'https://orangemug.github.io/font-glyphs/glyphs/Open%20Sans%20Regular/0-255.pbf')
          printf "protomaps=%s bytes=%s\norangemug=%s\n" "$P1" "$P1S" "$O1" > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA_FILE=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: check [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA_FILE\"}" && echo OK
