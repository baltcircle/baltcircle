name: Configure TakeRide Domain

on:
  workflow_dispatch:

jobs:
  configure-domain:
    name: Configure nginx and HTTPS for takeride.ru
    runs-on:
      - self-hosted
      - baltcircle-prod

    steps:
      - name: Configure nginx server names
        run: |
          set -euo pipefail
          sudo cp /etc/nginx/sites-available/baltcircle "/etc/nginx/sites-available/baltcircle.backup.$(date +%Y%m%d%H%M%S)" || true
          sudo tee /etc/nginx/sites-available/baltcircle > /dev/null <<'EOF'
          server {
              listen 80;
              server_name takeride.ru www.takeride.ru baltcircle.ru www.baltcircle.ru _;

              location / {
                  proxy_pass http://127.0.0.1:5000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          EOF
          sudo ln -sf /etc/nginx/sites-available/baltcircle /etc/nginx/sites-enabled/baltcircle
          sudo nginx -t
          sudo systemctl reload nginx

      - name: Issue certificate for takeride.ru
        run: |
          set -euo pipefail
          sudo certbot --nginx \
            -d takeride.ru \
            -d www.takeride.ru \
            --non-interactive \
            --agree-tos \
            -m admin@takeride.ru \
            --redirect

      - name: Smoke test new domain
        run: |
          set -euo pipefail
          curl --fail --max-time 30 https://takeride.ru >/dev/null
          curl --fail --max-time 30 https://www.takeride.ru >/dev/null
