name: Generate PMTiles
on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Extract bbox W,S,E,N (region + border zone)"
        required: false
        default: "18.3,53.3,26.8,57.3"
      city:
        description: "City/region label for release notes"
        required: false
        default: "Kaliningrad"
  push:
    branches: [main]
    paths:
      - .github/workflows/pmtiles-gen.yml

jobs:
  generate:
    runs-on: [self-hosted, baltcircle-prod]
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Extract PMTiles from Protomaps build and upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Multi-city scaling: override bbox/city via workflow_dispatch inputs.
          BBOX: ${{ github.event.inputs.bbox || '18.3,53.3,26.8,57.3' }}
          CITY: ${{ github.event.inputs.city || 'Kaliningrad' }}
          MAXZOOM: "14"
          # Protomaps CLI version (self-hostable extract tool, ODbL data).
          PMTILES_VER: "1.30.3"
        shell: bash
        run: |
          set -e
          cd /home/yc-user/osm
          echo "=== START ===" && free -h && df -h /

          # ── Ensure pmtiles CLI is available (replaces tilemaker + coastline + osmium) ──
          PM_BIN="/home/yc-user/osm/pmtiles"
          if [ ! -x "$PM_BIN" ] || ! "$PM_BIN" version 2>/dev/null | grep -q "$PMTILES_VER"; then
            echo "Installing pmtiles CLI v$PMTILES_VER..."
            curl -L "https://github.com/protomaps/go-pmtiles/releases/download/v${PMTILES_VER}/go-pmtiles_${PMTILES_VER}_Linux_x86_64.tar.gz" -o /tmp/pmtiles.tar.gz
            tar -xzf /tmp/pmtiles.tar.gz -C /home/yc-user/osm pmtiles
            chmod +x "$PM_BIN"
            rm -f /tmp/pmtiles.tar.gz
          fi
          echo "pmtiles: $("$PM_BIN" version 2>&1 | head -1)"

          # ── Resolve the latest daily Protomaps planet build ──
          # Builds published at build.protomaps.com/YYYYMMDD.pmtiles (kept ~90 days).
          BUILD_URL=""
          for i in $(seq 0 10); do
            D=$(date -u -d "-${i} day" +%Y%m%d)
            U="https://build.protomaps.com/${D}.pmtiles"
            if curl -sfI "$U" -o /dev/null; then BUILD_URL="$U"; echo "using build $D"; break; fi
          done
          test -n "$BUILD_URL" || { echo "ERROR: no recent Protomaps build found"; exit 1; }

          # ── Extract the region (range requests — reads only needed tiles) ──
          echo "=== pmtiles extract $BBOX (maxzoom $MAXZOOM) ==="
          "$PM_BIN" extract "$BUILD_URL" kaliningrad.pmtiles \
            --bbox="$BBOX" --maxzoom="$MAXZOOM"
          echo "pmtiles: $(du -sh kaliningrad.pmtiles)"
          "$PM_BIN" show kaliningrad.pmtiles 2>&1 | head -8 || true
          free -h

          # ── Publish to GitHub Release (same flow as before) ──
          TAG="pmtiles-latest"
          EXIST=$(curl -sf -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/tags/$TAG" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          if [ -n "$EXIST" ] && [ "$EXIST" != "None" ] && [ "$EXIST" != "" ]; then
            curl -sf -X DELETE -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/$EXIST"
          fi
          curl -sf -X DELETE -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/git/refs/tags/$TAG" || true

          SZ=$(du -sh kaliningrad.pmtiles | cut -f1)
          REL=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/releases" -d "{\"tag_name\":\"$TAG\",\"name\":\"PMTiles Map Data\",\"body\":\"Source: Protomaps basemap ($BUILD_URL). Region: $CITY (bbox $BBOX). Size: $SZ. Data (c) OpenStreetMap contributors, ODbL.\",\"draft\":false,\"prerelease\":false}")
          UPL=$(echo "$REL" | python3 -c "import json,sys; u=json.load(sys.stdin)['upload_url']; print(u.split('{')[0])")
          ASSET=$(curl -sf -X POST -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/octet-stream" "${UPL}?name=kaliningrad.pmtiles" --data-binary "@kaliningrad.pmtiles")
          URL=$(echo "$ASSET" | python3 -c "import json,sys; print(json.load(sys.stdin)['browser_download_url'])")
          echo "$URL" > /home/yc-user/osm/pmtiles_url.txt
          echo "=== DONE === URL: $URL"

      - name: Commit PMTiles URL to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -e
          URL=$(cat /home/yc-user/osm/pmtiles_url.txt)
          echo "URL: $URL"
          SHA=$(curl -sf -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/contents/pmtiles_url.txt" | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          ENC=$(printf '%s' "$URL" | base64 -w0)
          if [ -n "$SHA" ] && [ "$SHA" != "None" ]; then
            curl -sf -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/contents/pmtiles_url.txt" -d "{\"message\":\"ci: pmtiles url updated\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}"
          else
            curl -sf -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" "https://api.github.com/repos/$REPO/contents/pmtiles_url.txt" -d "{\"message\":\"ci: pmtiles url created\",\"content\":\"$ENC\"}"
          fi
          echo "pmtiles_url.txt committed"
