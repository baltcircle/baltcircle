name: Build Check
on: [workflow_dispatch, pull_request]
jobs:
  # Type-check and unit tests. Runs on every PR so type errors and business-logic
  # regressions (billing, ride start/finish, payment webhook) fail CI instead of
  # slipping through silently (audit H5). No secrets or DB required — tests mock
  # the storage layer.
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  build:
    runs-on: [self-hosted, baltcircle-prod]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build and capture error
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          docker build --no-cache -t bc-test . > /tmp/build.log 2>&1
          EXIT=$?
          echo "Exit: $EXIT"
          # Get last 50 lines of build log
          tail -50 /tmp/build.log > /tmp/r.txt
          cat /tmp/r.txt
          ENC=$(base64 -w0 /tmp/r.txt)
          SHA=$(curl -sf -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])" 2>/dev/null)
          curl -sf -X PUT -H "Authorization: token $TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/baltcircle/baltcircle/contents/diag-result.txt" \
            -d "{\"message\":\"ci: build log [skip ci]\",\"content\":\"$ENC\",\"sha\":\"$SHA\"}" && echo OK
          exit $EXIT
