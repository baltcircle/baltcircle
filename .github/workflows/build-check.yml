name: Build Check
on: [workflow_dispatch, pull_request]
jobs:
  # Type-check and unit tests. Runs on every PR so type errors and business-logic
  # regressions (billing, ride start/finish, payment webhook) fail CI instead of
  # slipping through silently (audit H5). No secrets or DB required — tests mock
  # the storage layer.
  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  build:
    runs-on: [self-hosted, baltcircle-prod]
    # No `contents: write` — the build log is published as an Actions artifact
    # instead of being self-committed back into the repo (audit M1).
    steps:
      - uses: actions/checkout@v4
      - name: Build and capture error
        run: |
          set +e
          docker build --no-cache -t bc-test . > /tmp/build.log 2>&1
          EXIT=$?
          echo "Exit: $EXIT"
          # Keep the last 50 lines of the build log for the artifact.
          tail -50 /tmp/build.log > diag-result.txt
          cat diag-result.txt
          exit $EXIT
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: diag-result.txt
          retention-days: 14
