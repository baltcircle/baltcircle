name: Restart Self-Hosted Runner

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Restart runner via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== Checking runner status ==="
            ps aux | grep actions-runner || true
            echo "=== Restarting runner ==="
            cd /home/yc-user/actions-runner && sudo ./svc.sh stop || true
            sleep 3
            cd /home/yc-user/actions-runner && sudo ./svc.sh start || true
            echo "=== Runner restarted ==="
            ps aux | grep actions-runner | grep -v grep || true
