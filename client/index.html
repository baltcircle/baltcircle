  <body>
    <div id="root"></div>
    <!--
      T-Bank return leg (?from=tbank) внутри iframe: форма привязки карты
      открывается в модальном iframe поверх «Способов оплаты», вкладка НЕ уходит
      на pay.tbank.ru. По завершении T-Bank редиректит iframe на
      /payment-methods?from=tbank. Если мы ВНУТРИ iframe (window !== parent) —
      шлём результат родителю через postMessage (он закроет модалку и
      обновит статус). Основной надёжный путь подтверждения — серверный
      webhook + polling; postMessage лишь ускоряет закрытие.
    -->
    <script>
      // Если это возврат с T-Bank ВНУТРИ iframe — не мешаем бандлу грузиться
      // (он подключён статическим тегом ниже, Vite подменяет путь на /assets/*),
      // просто сразу шлём результат родителю через postMessage. React внутри
      // iframe смонтируется как обычно, но родитель уже закроет модалку.
      (function () {
        try {
          var p = new URLSearchParams(location.search);
          var isReturn =
            p.has("from") || p.has("Success") || p.has("RequestKey") || p.has("ErrorCode");
          var inFrame = window.parent && window.parent !== window;
          if (isReturn && inFrame) {
            window.parent.postMessage(
              {
                type: "tbank:done",
                success: (p.get("Success") || "").toLowerCase() === "true",
                hasSuccess: p.has("Success"),
                errorCode: p.get("ErrorCode") || null,
                requestKey: p.get("RequestKey") || null,
              },
              location.origin
            );
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
