<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <!-- Standalone (Add to Home Screen) status-bar handling. `black-translucent`
         lets the WebView bleed UNDER the iOS status bar so the map (fixed
         inset-0) fills to the very top of the screen instead of leaving a dark
         header strip in the safe-area. Floating logo/burger already offset with
         env(safe-area-inset-top), so they stay clear of the clock/battery. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- theme-color = map water tone (#9fc9e0) so any browser-painted chrome
         (Android URL bar / iOS Safari top bar / status area) matches the map,
         not the dark app bg. Split light/dark so the strip looks the same in
         both themes (dark theme also uses the light water so the bar reads
         as “map continues here” rather than a dark header). Swappable by HEX. -->
    <meta name="theme-color" content="#dfefdb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#dfefdb" media="(prefers-color-scheme: dark)" />

    <!-- PWA manifest — required by iOS Safari to activate env(safe-area-inset-*)
         and let the WebView draw under the status bar / home indicator when
         launched from the home screen. Without a manifest iOS clips the
         WebView to visualViewport and returns env() = 0 even when
         apple-mobile-web-app-status-bar-style=black-translucent is set. -->
    <link rel="manifest" href="/manifest.webmanifest" />
