# BaltCircle edge (nginx) — TLS termination, HTTP→HTTPS redirect and security
# headers in front of the Node app on 127.0.0.1:5000 (audit H4).
#
# This app handles payments and geolocation, so plain HTTP is not acceptable in
# production. Before this config will serve HTTPS you must provision a
# certificate. With Let's Encrypt / certbot on the host:
#
#   sudo certbot certonly --webroot -w /var/www/certbot \
#       -d example.com -d www.example.com
#
# certbot writes the cert/key to /etc/letsencrypt/live/<domain>/ (referenced
# below). Replace `example.com` with the real domain in all three places.

# ---------------------------------------------------------------------------
# Port 80: serve the ACME http-01 challenge and redirect everything else to 443.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name example.com www.example.com;

    # Let certbot answer the http-01 challenge over plain HTTP during issuance
    # and renewal. Point --webroot at this directory.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else is redirected to HTTPS (301 permanent).
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Port 443: TLS termination + reverse proxy to the Node app.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name example.com www.example.com;

    # --- TLS certificate (Let's Encrypt paths; adjust the domain) -----------
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Modern, safe defaults. `ssl-dhparams.pem` is generated by certbot; if you
    # do not use certbot, generate one with:
    #   openssl dhparam -out /etc/nginx/ssl-dhparams.pem 2048
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    # ssl_dhparam /etc/nginx/ssl-dhparams.pem;   # uncomment once generated

    # --- Security headers ---------------------------------------------------
    # HSTS: force HTTPS for two years incl. subdomains. Only sent over HTTPS.
    # Remove `preload` (and submit the domain) only if you understand the
    # implications; keep it out until you are certain HTTPS is permanent.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy — a baseline tuned NOT to break current features:
    #   * MapLibre GL loads its worker from a blob: URL and fetches vector/raster
    #     tiles + glyphs over https (self-hosted tile endpoints and, in dev,
    #     public demo tiles) — allow blob: worker and https/data img/connect.
    #   * T-Bank / T-Kassa payment flow REDIRECTS to securepay.tinkoff.ru (it is
    #     not embedded), but frame-src is allowed for it defensively in case a
    #     3DS step-up is framed.
    #   * 'unsafe-inline'/'unsafe-eval' are permitted for scripts/styles because
    #     the current Vite build and MapLibre rely on them; tighten to nonces
    #     later if the bundle allows.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https: wss:; frame-src 'self' https://securepay.tinkoff.ru https://*.tinkoff.ru; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://securepay.tinkoff.ru; object-src 'none'" always;

    # --- Reverse proxy to the Node app -------------------------------------
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (active-ride stream) and WebSocket upgrades must pass through.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
}
