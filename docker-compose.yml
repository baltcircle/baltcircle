name: baltcicl

services:
  baltcircle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Read from the host env at build time (set by the deploy workflow from
        # the GitHub Actions secret). Empty -> app falls back to the demo map.
        VITE_YANDEX_MAPS_API_KEY: ${VITE_YANDEX_MAPS_API_KEY:-}
    container_name: baltcircle-mvp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_PATH: /app/data/data.db
      # SMS OTP — backend-only runtime config (not inlined into the client
      # bundle). Read from the host env (set by the deploy workflow from GitHub
      # secrets). If SMS_PROVIDER is empty the app uses a dev fallback that logs
      # codes instead of sending SMS, so production must set SMS_PROVIDER=smsru.
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMSRU_API_ID: ${SMSRU_API_ID:-}
      # SigmaSMS provider config (used when SMS_PROVIDER=sigmasms). The static
      # account token is SECRET and read from the host env (set by the deploy
      # workflow from the GitHub `SIGMASMS` secret). SIGMASMS_TOKEN is an alias
      # honoured first if present. Sender + API base are optional and default to
      # "TakeRide" / the production host inside the app when empty.
      SIGMASMS_TOKEN: ${SIGMASMS_TOKEN:-}
      SIGMASMS_SENDER: ${SIGMASMS_SENDER:-}
      SIGMASMS_API_BASE: ${SIGMASMS_API_BASE:-}
      # Optional dedicated secret for hashing OTP codes; falls back to
      # SESSION_SECRET when unset.
      OTP_SECRET: ${OTP_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Comma-separated list of phone numbers granted the admin role. Temporary
      # bootstrap until a role-admin UI exists. Read from the host env (set by
      # the deploy workflow from a GitHub secret). Empty -> no auto-admins.
      ADMIN_PHONE_NUMBERS: ${ADMIN_PHONE_NUMBERS:-}
      # T-Bank / T-Kassa acquiring — backend-only runtime config (never inlined
      # into the client bundle). Terminal key + password are SECRET and read from
      # the host env (set by the deploy workflow from GitHub secrets). When the
      # key/password are empty the payment endpoints return 503 and the UI shows
      # "Платежи настраиваются" — the app keeps running.
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY:-}
      # IMPORTANT — preserving a `$` in the password. The `${TBANK_PASSWORD:-}`
      # form below reads the value from the HOST process environment and passes
      # it through verbatim (Compose does not re-interpolate the substituted
      # value), so a password like `$ecret` survives intact when exported in the
      # shell that runs `docker compose`. The danger is a Compose `.env` file:
      # Compose DOES interpolate `.env`, so a literal `$` there must be written
      # as `$$` (e.g. TBANK_PASSWORD=$$ecret) or it will be mangled/truncated.
      # Prefer host env (the deploy workflow injects GitHub secrets that way).
      TBANK_PASSWORD: ${TBANK_PASSWORD:-}
      # API base defaults to the production acquiring host inside the app when empty.
      TBANK_API_BASE: ${TBANK_API_BASE:-}
      # Public origin used to build Success/Fail/Notification URLs; defaults to
      # https://takeride.ru inside the app when empty.
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
    ports:
      - "5000:5000"
    volumes:
      - baltcircle_data:/app/data

volumes:
  baltcircle_data:
    name: baltcicl_baltcircle_data
